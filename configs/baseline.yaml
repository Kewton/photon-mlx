version: 1

project:
  name: "photon-reporag"
  mode: "baseline"

run:
  name_prefix: "baseline"
  seed: 42
  deterministic: true

paths:
  data_root: "./data"
  raw_root: "./data/raw"
  processed_root: "./data/processed"
  index_root: "./data/indexes"
  eval_root: "./data/eval_sets"
  log_root: "./logs"
  report_root: "./reports"
  prompt_root: "./prompts"
  cache_root: "./.cache"

runtime:
  device: "auto"         # auto | cpu | gpu
  dtype: "float16"       # float32 | float16 | bfloat16
  num_workers: 8
  profile_latency: true
  profile_memory: true
  fail_fast: false

repo:
  repo_id: "fastapi_fastapi"
  repo_path: "./data/raw/fastapi"
  repo_commit: "eba8942c81dbf990d25fbae34e6601bdbc21e74b"

  include:
    - "**/*.py"
    - "**/*.ts"
    - "**/*.tsx"
    - "**/*.js"
    - "**/*.jsx"
    - "**/*.go"
    - "**/*.rs"
    - "**/*.java"
    - "**/*.kt"
    - "**/*.md"
    - "**/*.yaml"
    - "**/*.yml"
    - "**/*.json"
    - "**/*.toml"
    - "**/*.sh"

  exclude:
    - "**/.git/**"
    - "**/node_modules/**"
    - "**/dist/**"
    - "**/build/**"
    - "**/.next/**"
    - "**/coverage/**"
    - "**/__pycache__/**"
    - "**/.venv/**"
    - "**/*.lock"
    - "**/*.min.js"
    - "**/*.png"
    - "**/*.jpg"
    - "**/*.jpeg"
    - "**/*.gif"
    - "**/*.pdf"
    - "docs/*/docs/**"

ingestion:
  chunking:
    strategy: "code_aware"          # code_aware | markdown_aware | plain
    max_chars: 2400
    overlap_chars: 300
    max_lines: 120
    overlap_lines: 12
    min_chunk_chars: 200
    keep_function_boundary: true
    keep_class_boundary: true
    attach_section_headers: true
    attach_file_header: true

  metadata:
    keep_file_path: true
    keep_language: true
    keep_symbols: true
    keep_imports: true
    keep_section_titles: true
    keep_line_spans: true

indexing:
  lexical:
    enabled: true
    engine: "bm25"

  embedding:
    enabled: true
    provider: "local"
    model_id: "sentence-transformers/all-MiniLM-L6-v2"
    batch_size: 64
    normalize: true

  symbol_graph:
    enabled: true
    include_import_edges: true
    include_call_edges: true
    include_inheritance_edges: true

  dependency_graph:
    enabled: true
    max_hops: 2

retrieval:
  mode: "hybrid"

  lexical_top_k: 20
  embedding_top_k: 20
  fused_top_k: 16
  rerank_top_k: 12

  weights:
    lexical: 0.45
    embedding: 0.45
    graph: 0.10

  reranker:
    enabled: false
    model_id: ""

  query_expansion:
    enabled: false
    include_symbol_aliases: true
    include_filename_hints: true

  neighborhood_expansion:
    enabled: true
    before: 1
    after: 1

  graph_expansion:
    enabled: true
    max_hops: 1
    max_nodes: 24

  citation_bias:
    prefer_previously_cited_chunks: true
    boost_recent_citations: 0.15

evidence_pack:
  max_chunks: 16
  max_tokens: 16000
  include_neighbors: true
  include_section_headers: true
  include_recent_citations: true
  include_repo_overview: true

  local_refresh:
    enabled: true
    top_k: 4
    refresh_before_answer: true
    refresh_on_exact_quote: true
    refresh_on_diff_or_patch: true

session_memory:
  mode: "summary_pinned"      # none | flat_recent | summary_pinned
  max_turns: 8
  summary_max_tokens: 800
  pin_recent_chunks_max: 8
  pin_cited_chunks_max: 12
  keep_user_constraints: true
  track_topic_state: true

model:
  provider: "mlx_lm"          # mlx_lm | transformers | mock
  model_id: "mlx-community/Qwen2.5-Coder-14B-Instruct-4bit"
  tokenizer_id: ""
  trust_remote_code: false
  use_quantized: true
  quantization: "4bit"

generation:
  max_new_tokens: 768
  temperature: 0.2
  top_p: 0.9
  repetition_penalty: 1.05
  do_sample: false
  stop_sequences: []

answering:
  prompt_template: "reporag_answer_v1"
  cite_style: "bracket_chunk_ids"
  require_citations: true
  allow_abstain: true
  abstain_message: "根拠が不足しているため断定できません。追加の関連箇所を再検索します。"

  citation_postprocess_enabled: true   # post-processing: no-citation 回答に [C:1] を自動付与

  structure:
    short_answer: true
    key_evidence: true
    reasoning: true
    risks: true
    next_steps: true

  exact_quote:
    enabled: true
    require_local_refresh: true
    max_quote_chars: 300

  patch_mode:
    enabled: true
    require_local_refresh: true
    require_target_file_grounding: true

safety:
  high_risk_keywords:
    - "auth"
    - "authorization"
    - "permission"
    - "billing"
    - "payment"
    - "security"
    - "encryption"
    - "delete"
    - "drop table"
    - "migration"
    - "compliance"

  strict_grounding_for:
    - "exact_quote"
    - "diff"
    - "patch"
    - "security_review"
    - "billing_change"

serving:
  host: "127.0.0.1"
  port: 8080
  cors_enabled: false
  request_timeout_seconds: 180

logging:
  level: "INFO"
  save_raw_prompt: true
  save_raw_answer: true
  save_retrieval_debug: true
  save_latency_breakdown: true
  save_memory_metrics: true
  save_citations: true

profiling:
  enabled: true
  measure_retrieval_time: true
  measure_prefill_time: true
  measure_decode_time: true
  measure_end_to_end_time: true
  measure_peak_memory: true

bench_defaults:
  static_eval_enabled: true
  multi_turn_eval_enabled: true
  stress_eval_enabled: true
  save_predictions: true