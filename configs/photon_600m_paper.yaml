version: 1

project:
  name: "photon-reporag"
  mode: "photon_600m_paper"

run:
  name_prefix: "photon_600m_paper"
  seed: 42
  deterministic: true

paths:
  data_root: "./data"
  raw_root: "./data/raw"
  processed_root: "./data/processed"
  index_root: "./data/indexes"
  eval_root: "./data/eval_sets"
  log_root: "./logs"
  report_root: "./reports"
  checkpoint_root: "./checkpoints"
  cache_root: "./.cache"

runtime:
  device: "auto"
  dtype: "float16"
  num_workers: 8
  profile_latency: true
  profile_memory: true
  compile_decode_step: true

repo:
  repo_id: "fastapi_fastapi"
  repo_path: "./data/raw/fastapi"
  repo_commit: "eba8942c81dbf990d25fbae34e6601bdbc21e74b"

ingestion:
  chunking:
    strategy: "code_aware"
    max_chars: 2400
    overlap_chars: 300
    max_lines: 120
    overlap_lines: 12
    keep_function_boundary: true
    keep_class_boundary: true
    attach_section_headers: true
    attach_file_header: true

indexing:
  lexical:
    enabled: true
    engine: "bm25"

  embedding:
    enabled: true
    provider: "local"
    model_id: "sentence-transformers/all-MiniLM-L6-v2"
    batch_size: 64
    normalize: true

  symbol_graph:
    enabled: true

retrieval:
  mode: "hybrid"
  lexical_top_k: 20
  embedding_top_k: 20
  fused_top_k: 16
  rerank_top_k: 12

  weights:
    lexical: 0.45
    embedding: 0.45
    graph: 0.10

  neighborhood_expansion:
    enabled: true
    before: 1
    after: 1

  graph_expansion:
    enabled: true
    max_hops: 1
    max_nodes: 24

  two_pass_search:
    enabled: false       # Issue #56: enable to add Pass 1 PHOTON scoring on Turn 1
    pass1_top_k: 64      # candidates fetched by retrieval for Pass 1
    pass2_top_k: 16      # top-K passed to evidence pack (keep aligned with evidence_pack.max_chunks)

evidence_pack:
  max_chunks: 16
  max_tokens: 16000
  include_neighbors: true
  include_section_headers: true

  local_refresh:
    enabled: true
    top_k: 4
    refresh_before_answer: true
    refresh_on_exact_quote: true
    refresh_on_diff_or_patch: true

session_memory:
  mode: "photon"
  max_turns: 8
  summary_max_tokens: 800
  pin_recent_chunks_max: 8
  pin_cited_chunks_max: 12
  track_topic_state: true

  # Issue #64 / #79: cross-turn hierarchical working memory.
  # Re-enabled with storage_mode="top_level_only" (Issue #79 Phase 2).
  # At 600M-paper scale the full hierarchy for 8 turns exceeds the
  # 100 MiB ceiling, so we retain only level_states[-1] per turn.
  working_memory:
    enabled: true
    max_turns: 8
    decay_factor: 0.5
    relevant_turn_threshold: 0.7
    storage_mode: "top_level_only"

tokenizer:
  tokenizer_id: "meta-llama/Llama-2-7b-hf"
  vocab_size: 32000

model:
  architecture: "photon_decoder"

  # Paper Table 10 aligned (600M)
  # base_embed_dim: 416, hidden_size: 1664, FFN: 4096, 32 heads, enc/dec 4 layers each
  base_embed_dim: 416
  hidden_size: 1664
  intermediate_size: 4096

  num_attention_heads: 32
  num_key_value_heads: 32
  head_dim: 52

  max_position_embeddings: 2048
  rope_theta: 1000000.0
  norm_eps: 0.00001
  tie_word_embeddings: false
  dropout: 0.0
  bias: false

hierarchy:
  levels: 2

  # Paper-conformal default
  chunk_sizes: [4, 4]
  converter_prefix_lengths: [2, 2]

  chunker:
    level1_type: "concat"
    upper_type: "linear"

  encoder_layers_per_level: [4, 4]
  decoder_layers_per_level: [4, 4]

  context_encoder_arch: "llama_decoder_style"
  context_decoder_arch: "llama_decoder_style"
  context_converter_type: "conv1d"

  recursive_loss_weight: 0.0
  bottleneck_consistency_target: "top_level"

training:
  # Architecture-matched config.
  # Paper の H200 フル学習の再現は意図しない。forward/eval の整合確認用。
  enabled: false
  stage: "paper600m_arch_only"

  train_corpus: "./data/processed/train_small.jsonl"
  val_corpus: "./data/processed/val_small.jsonl"

  context_length: 2048
  micro_batch_size: 1
  gradient_accumulation_steps: 32

  learning_rate: 0.00012
  min_learning_rate: 0.000012
  warmup_ratio: 0.03
  weight_decay: 0.1
  max_grad_norm: 1.0

  max_steps: 2000
  eval_every_steps: 200
  save_every_steps: 500
  log_every_steps: 20

  # Early stopping (Issue #60): explicit opt-out for this reference-only
  # config (training.enabled is false; no real run is launched from it).
  early_stopping:
    enabled: false

inference:
  hierarchical_prefill: true
  recgen_enabled: true
  safe_recgen_enabled: false

  # Issue #62 Phase 1: opt-in PHOTON single-path generation (default false).
  photon_generation_enabled: false
  generation_fallback_policy: "qwen"

  answer_max_new_tokens: 768
  temperature: 0.2
  top_p: 0.9
  do_sample: false

safe_recgen:
  enabled: false

drift_monitoring:
  enabled: true
  track_latent_cosine_drift: true
  track_token_agreement: true
  track_logit_kl: true
  save_turn_level_metrics: true

logging:
  level: "INFO"
  save_hidden_stats: true
  save_drift_metrics: true
  save_latency_breakdown: true
  save_memory_metrics: true
